<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="la-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3a679"/>
      <stop offset="40%" stop-color="#f4c178"/>
      <stop offset="75%" stop-color="#f6dca0"/>
      <stop offset="100%" stop-color="#f9ebc1"/>
    </linearGradient>
    <linearGradient id="la-ocean" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d68a72"/>
      <stop offset="100%" stop-color="#8c5a6e"/>
    </linearGradient>
    <radialGradient id="la-sunglow" cx="0.78" cy="0.65" r="0.5">
      <stop offset="0%" stop-color="#ffe7a8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffe7a8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="240" fill="url(#la-sky)"/>
  <rect width="400" height="240" fill="url(#la-sunglow)"/>
  <circle cx="312" cy="160" r="26" fill="#fff4c4"/>
  <rect y="172" width="400" height="68" fill="url(#la-ocean)"/>
  <g stroke="#f6d39c" stroke-width="0.7" opacity="0.5">
    <line x1="0" y1="184" x2="120" y2="184"/>
    <line x1="160" y1="190" x2="280" y2="190"/>
    <line x1="0" y1="200" x2="80" y2="200"/>
    <line x1="200" y1="206" x2="360" y2="206"/>
    <line x1="40" y1="218" x2="200" y2="218"/>
    <line x1="260" y1="222" x2="400" y2="222"/>
  </g>
  <!-- distant mountains -->
  <path d="M -10 175 L 60 145 L 110 165 L 170 140 L 230 168 L 290 150 L 360 170 L 410 160 L 410 180 L -10 180 Z" fill="#7a4f5c" opacity="0.75"/>
  <!-- beach -->
  <path d="M -10 200 Q 100 195 200 202 T 410 200 L 410 210 L -10 210 Z" fill="#e6c592" opacity="0.7"/>
  <!-- palm trees -->
  <g fill="#1a1424">
    <!-- left palm -->
    <path d="M 56 240 Q 50 180 70 130 Q 72 132 60 240 Z"/>
    <g transform="translate(66,128)">
      <path d="M 0 0 Q -28 -18 -52 -12 Q -30 -6 0 4 Z"/>
      <path d="M 0 0 Q 30 -22 56 -14 Q 32 -6 0 4 Z"/>
      <path d="M 0 0 Q -10 -34 -28 -42 Q -10 -22 0 4 Z"/>
      <path d="M 0 0 Q 14 -30 38 -38 Q 16 -20 0 4 Z"/>
      <path d="M 0 0 Q -36 6 -52 22 Q -28 8 0 4 Z"/>
      <path d="M 0 0 Q 34 8 50 24 Q 26 10 0 4 Z"/>
      <circle r="3" fill="#3a2e1e"/>
      <circle cx="-4" cy="3" r="2" fill="#3a2e1e"/>
      <circle cx="4" cy="2" r="2" fill="#3a2e1e"/>
    </g>
    <!-- right palm (taller) -->
    <path d="M 348 240 Q 344 170 360 100 Q 362 102 354 240 Z"/>
    <g transform="translate(358,98)">
      <path d="M 0 0 Q -34 -22 -62 -14 Q -36 -6 0 4 Z"/>
      <path d="M 0 0 Q 36 -26 64 -16 Q 38 -6 0 4 Z"/>
      <path d="M 0 0 Q -12 -40 -34 -48 Q -12 -24 0 4 Z"/>
      <path d="M 0 0 Q 16 -36 42 -44 Q 18 -22 0 4 Z"/>
      <path d="M 0 0 Q -42 8 -60 26 Q -32 10 0 4 Z"/>
      <path d="M 0 0 Q 40 10 58 28 Q 32 12 0 4 Z"/>
      <circle r="3" fill="#3a2e1e"/>
      <circle cx="-4" cy="3" r="2" fill="#3a2e1e"/>
      <circle cx="4" cy="2" r="2" fill="#3a2e1e"/>
    </g>
  </g>
  <!-- Service icon: dining (fork + knife) -->
  <g transform="translate(360, 140)">
    <circle r="26" fill="#ffffff" opacity="0.95"/>
    <circle r="23" fill="#1a2e4a"/>
    <g fill="#ffffff">
      <!-- fork: 4 tines, base, handle -->
      <g transform="translate(-6, 0)">
        <rect x="-4.7" y="-12.8" width="1.6" height="6" rx="0.7"/>
        <rect x="-1.9" y="-12.8" width="1.6" height="6" rx="0.7"/>
        <rect x="0.9" y="-12.8" width="1.6" height="6" rx="0.7"/>
        <rect x="3.7" y="-12.8" width="1.6" height="6" rx="0.7"/>
        <rect x="-4.7" y="-6.8" width="10.1" height="2.2" rx="0.5"/>
        <rect x="-0.9" y="-4.7" width="1.9" height="15.5" rx="0.8"/>
      </g>
      <!-- knife: blade + handle -->
      <g transform="translate(7.4, 0)">
        <rect x="-1.5" y="-12.8" width="3" height="9.4" rx="1.2"/>
        <rect x="-0.9" y="-3.4" width="1.9" height="14.2" rx="0.8"/>
      </g>
    </g>
  </g>
</svg>
